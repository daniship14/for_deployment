services:
  fastapi:
    image: fastapi-app
    container_name: fastapi_app
    restart: always
    expose:
      - "7030"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - fastapi

